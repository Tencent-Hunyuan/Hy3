# isgrace.limlamleen.com — new site, added alongside the existing
# bd.limlamleen.com (sites-available/athenax-dashboard). Does not touch that
# file. Same house style as bd's config: plain HTTP on port 80, no local TLS —
# Cloudflare terminates HTTPS at the edge (proxied DNS record), matching
# deploy/setup.sh:150 / deploy/migrate-vps.sh:13 in the dashboard project.
#
# Install:
#   cp nginx-isgrace.conf /etc/nginx/sites-available/isgrace
#   ln -s /etc/nginx/sites-available/isgrace /etc/nginx/sites-enabled/isgrace
#   nginx -t && systemctl reload nginx   # reload, never restart — bd stays up

server {
    listen 80;
    listen [::]:80;
    server_name isgrace.limlamleen.com;

    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE (streamed chat) needs buffering off and a long read timeout
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    location / {
        root /opt/isgrace/dist;
        try_files $uri /index.html;
    }
}
