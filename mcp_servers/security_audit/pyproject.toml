[project]
name = "hy3-security-mcp"
version = "0.1.0"
description = "Hy3-powered security audit MCP server (Tencent RhinoBird 2026, Hy3 issue #3)"
readme = "README.md"
authors = [
    { name = "Acture", email = "acturea@gmail.com" }
]
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.28.1",
    "mcp[cli]>=1.28.1",
    "openai>=2.44.0",
    "pydantic>=2.13.4",
    "pyyaml>=6.0.3",
]

[project.scripts]
hy3-security-mcp = "hy3_security_mcp.server:main"

[build-system]
requires = ["uv_build>=0.11.26,<0.12.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "pytest>=9.1.1",
    "pytest-asyncio>=1.4.0",
    "ruff>=0.15.20",
    "ty>=0.0.56",
]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
