[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "rulelens"
version = "1.0.0"
description = "RuleLens · 规则透镜 — 把规则文档变成可验证的边界案例（基于 Hy3）"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "RuleLens Contributors" }]
keywords = ["rules", "hy3", "streamlit", "document-analysis"]

dependencies = [
    "streamlit>=1.34",
    "openai>=1.30",
    "pydantic>=2.6",
    "pypdf>=4.2",
    "python-docx>=1.1",
    "python-dotenv>=1.0",
    "tenacity>=8.2",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.4",
    "fpdf2>=2.7",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "live_hy3: 真实调用 Hy3 API 的冒烟测试（默认不运行）",
]
addopts = "-q -m 'not live_hy3'"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "W"]
ignore = ["E501"]

[tool.ruff.format]
quote-style = "double"
