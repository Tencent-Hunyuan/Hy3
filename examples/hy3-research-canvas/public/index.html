<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hy3 Research Canvas</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <aside class="control-panel">
        <div class="brand-row">
          <img src="/hy3-mark.svg" alt="Hy3">
          <div>
            <h1>Hy3 Research Canvas</h1>
            <p id="statusLine">Checking Hy3 endpoint...</p>
          </div>
        </div>

        <div class="tabs" role="tablist" aria-label="Workflow">
          <button class="tab active" data-tab="research" type="button">Research</button>
          <button class="tab" data-tab="rewrite" type="button">Rewrite</button>
        </div>

        <form id="researchForm" class="panel-form">
          <label>
            Topic
            <input name="topic" value="How should a small AI team evaluate Hy3 for product research workflows?">
          </label>
          <label>
            Audience
            <input name="audience" value="Product manager and engineering lead">
          </label>
          <label>
            Depth
            <select name="depth">
              <option>Executive brief</option>
              <option>Detailed memo</option>
              <option>Launch plan</option>
            </select>
          </label>
          <label>
            Known context
            <textarea name="context">The team needs a repeatable way to turn notes into cited plans and stakeholder-ready summaries.</textarea>
          </label>
          <button class="primary-action" type="submit">Generate Brief</button>
        </form>

        <form id="rewriteForm" class="panel-form hidden">
          <label>
            Text
            <textarea name="text">Hy3 helps the team plan research, inspect evidence, and draft a final report from the same workspace.</textarea>
          </label>
          <label>
            Target language
            <select name="language">
              <option>English</option>
              <option>Chinese</option>
              <option>Japanese</option>
              <option>Spanish</option>
            </select>
          </label>
          <label>
            Tone
            <select name="tone">
              <option>Product launch</option>
              <option>Academic</option>
              <option>Friendly</option>
              <option>Concise executive</option>
            </select>
          </label>
          <label>
            Audience
            <input name="audience" value="External developers">
          </label>
          <button class="primary-action" type="submit">Rewrite</button>
        </form>
      </aside>

      <section class="workspace">
        <div class="workspace-header">
          <div>
            <p class="eyebrow">Live Workspace</p>
            <h2 id="resultTitle">Ready for a Hy3 run</h2>
          </div>
          <button id="loadDemo" class="secondary-action" type="button">Load Demo</button>
        </div>

        <div id="loading" class="loading hidden">Hy3 is thinking...</div>

        <div class="result-grid">
          <section class="result-panel report-panel">
            <h3>Report</h3>
            <article id="reportOutput" class="markdown-output">
              <p>Choose a workflow and run it. Mock mode gives deterministic output; live mode sends the same request to Hy3.</p>
            </article>
          </section>

          <section class="result-panel">
            <h3>Plan</h3>
            <ol id="planOutput" class="steps"></ol>
          </section>

          <section class="result-panel">
            <h3>Citations</h3>
            <div id="citationOutput" class="citation-list"></div>
          </section>

          <section class="result-panel">
            <h3>Risks & Actions</h3>
            <ul id="riskOutput" class="compact-list"></ul>
            <ul id="actionOutput" class="compact-list action-list"></ul>
          </section>
        </div>
      </section>
    </main>
    <script src="/app.js" type="module"></script>
  </body>
</html>
